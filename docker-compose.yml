services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      # Frontend container serves on :80 (default HTTP port → no port in
      # the origin). :5173 is included too so a local `npm run dev`
      # frontend can also talk to this dockerized backend.
      - BEYONDLABS_CORS_ORIGINS=http://localhost,http://127.0.0.1,http://localhost:5173,http://127.0.0.1:5173
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
