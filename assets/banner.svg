<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0202"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4b4b"/>
      <stop offset="0.55" stop-color="#c0392b"/>
      <stop offset="1" stop-color="#7a0d0d"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur">
        <animate attributeName="stdDeviation" values="3.5;8;3.5" dur="3.2s" repeatCount="indefinite"/>
      </feGaussianBlur>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1.2" fill="#ff2b2b" opacity="0.035"/>
    </pattern>
  </defs>

  <rect width="1200" height="300" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="1198" height="298" rx="13" fill="none" stroke="#3a0a0a" stroke-width="1.5"/>

  <!-- title bar -->
  <path d="M1 14 a13 13 0 0 1 13 -13 h1172 a13 13 0 0 1 13 13 v25 h-1198 z" fill="#130505"/>
  <line x1="1" y1="39" x2="1199" y2="39" stroke="#2a0a0a" stroke-width="1"/>
  <circle cx="28" cy="20" r="6" fill="#ff5f56"/>
  <circle cx="50" cy="20" r="6" fill="#ffbd2e"/>
  <circle cx="72" cy="20" r="6" fill="#27c93f"/>
  <text x="600" y="25" text-anchor="middle" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="13" fill="#8a7a7a">sockr17@arch:~/beyondlabs</text>

  <!-- static scanline texture -->
  <rect x="1" y="40" width="1198" height="259" fill="url(#scan)"/>

  <!-- moving CRT scan sweep -->
  <rect x="1" y="40" width="1198" height="4" fill="#ff2b2b" opacity="0.1">
    <animate attributeName="y" values="40;294;40" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.16;0" dur="5s" repeatCount="indefinite"/>
  </rect>

  <!-- wordmark -->
  <text x="600" y="168" text-anchor="middle" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="64" font-weight="700" letter-spacing="6" fill="url(#textGrad)" filter="url(#glow)">BEYONDLABS</text>

  <!-- tagline -->
  <text x="600" y="206" text-anchor="middle" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="16" letter-spacing="3" fill="#9a9a9a">LOCAL-FIRST · SOC ANALYST WORKBENCH</text>

  <!-- prompt line with blinking cursor -->
  <text x="600" y="250" text-anchor="middle" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="15" fill="#c0392b">$ ./run.sh <tspan fill="#6b6b6b">--profile recommended</tspan><tspan fill="#ff4b4b"> █<animate attributeName="opacity" values="1;1;0;0;1" keyTimes="0;0.4;0.5;0.9;1" dur="1.1s" repeatCount="indefinite"/></tspan></text>
</svg>
