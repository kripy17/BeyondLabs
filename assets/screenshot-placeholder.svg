<svg width="800" height="450" viewBox="0 0 800 450" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pbg" x1="0" y1="0" x2="800" y2="450" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0c0202"/>
      <stop offset="1" stop-color="#000000"/>
    </linearGradient>
    <pattern id="pscan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1.2" fill="#ff2b2b" opacity="0.03"/>
    </pattern>
  </defs>

  <rect width="800" height="450" rx="10" fill="url(#pbg)"/>
  <rect x="1" y="1" width="798" height="448" rx="9" fill="none" stroke="#3a0a0a" stroke-width="1.5" stroke-dasharray="8 6"/>

  <!-- mini terminal chrome, matches banner -->
  <path d="M1 11 a9 9 0 0 1 9 -9 h780 a9 9 0 0 1 9 9 v19 h-798 z" fill="#130505"/>
  <line x1="1" y1="30" x2="799" y2="30" stroke="#2a0a0a" stroke-width="1"/>
  <circle cx="20" cy="15" r="4.5" fill="#ff5f56"/>
  <circle cx="36" cy="15" r="4.5" fill="#ffbd2e"/>
  <circle cx="52" cy="15" r="4.5" fill="#27c93f"/>
  <text x="400" y="19" text-anchor="middle" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="10.5" fill="#7a6a6a">workspace preview</text>

  <rect x="1" y="31" width="798" height="418" fill="url(#pscan)"/>

  <!-- corner brackets, HUD style -->
  <path d="M28 90 v-20 h20" stroke="#6b1414" stroke-width="2" fill="none"/>
  <path d="M772 90 v-20 h-20" stroke="#6b1414" stroke-width="2" fill="none"/>
  <path d="M28 400 v20 h20" stroke="#6b1414" stroke-width="2" fill="none"/>
  <path d="M772 400 v20 h-20" stroke="#6b1414" stroke-width="2" fill="none"/>

  <!-- icon: simple monitor/frame glyph -->
  <rect x="360" y="188" width="80" height="56" rx="4" fill="none" stroke="#8a2323" stroke-width="2.5"/>
  <line x1="380" y1="256" x2="420" y2="256" stroke="#8a2323" stroke-width="2.5"/>
  <line x1="400" y1="244" x2="400" y2="256" stroke="#8a2323" stroke-width="2.5"/>
  <circle cx="378" cy="206" r="3" fill="#8a2323"/>
  <path d="M368 234 l14 -16 l10 10 l16 -18" stroke="#8a2323" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="400" y="288" text-anchor="middle" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="15" letter-spacing="2" fill="#8a5a5a">
    SCREENSHOT PENDING
    <animate attributeName="opacity" values="1;0.45;1" dur="2.4s" repeatCount="indefinite"/>
  </text>
  <text x="400" y="310" text-anchor="middle" font-family="JetBrains Mono, Fira Code, Consolas, monospace" font-size="11" letter-spacing="1" fill="#5a3a3a">replace this file in .github/assets/</text>
</svg>
